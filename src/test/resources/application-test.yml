spring:
  datasource:
    url: jdbc:h2:mem:creev-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=30000
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 50

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      jakarta.persistence.lock.timeout: 30000

  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
